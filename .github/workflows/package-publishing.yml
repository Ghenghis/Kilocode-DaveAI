name: 📦 Package Publishing

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish (or "all")'
        required: true
        type: string
        default: 'all'
      tag:
        description: 'Publish tag (latest, next, beta, alpha)'
        required: false
        type: choice
        options:
          - latest
          - next
          - beta
          - alpha
        default: 'latest'
      dry_run:
        description: 'Dry run (no actual publishing)'
        required: false
        type: boolean
        default: false

env:
  NODE_VERSION: '20'
  BUN_VERSION: '1.3.10'

jobs:
  # Validate and prepare
  prepare:
    name: 🔍 Prepare Publishing
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.matrix.outputs.packages }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Determine Packages
        id: matrix
        run: |
          if [[ "${{ github.event.inputs.package }}" == "all" ]]; then
            PACKAGES='["@kilocode/cli","@kilocode/kilo-gateway","@kilocode/kilo-telemetry","@kilocode/kilo-i18n","@kilocode/plugin","@kilocode/util","@kilocode/kilo-ui","@opencode-ai/app","@opencode-ai/desktop","@opencode-ai/desktop-electron","@opencode-ai/storybook","@kilocode/kilo-docs","@kilocode/sdk"]'
          else
            PACKAGES='${{ github.event.inputs.package }}'
          fi
          echo "packages=$PACKAGES" >> $GITHUB_OUTPUT
          echo "Publishing packages: $PACKAGES"

      - name: Set Tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Validate Packages
        run: |
          for pkg in $(echo '${{ steps.matrix.outputs.packages }}' | tr ',' '\n'); do
            if [[ ! -d "packages/$(echo $pkg | sed 's/@.*\///')" ]]; then
              echo "❌ Package $pkg not found"
              exit 1
            fi
          done

  # Build packages
  build:
    name: 🔨 Build ${{ matrix.package }}
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix:
        package: ${{ fromJson(needs.prepare.outputs.packages) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build Package
        run: |
          pkg_name="${{ matrix.package }}"
          pkg_dir=$(echo $pkg_name | sed 's/@.*\///')
          bun run --cwd packages/$pkg_dir build

      - name: Test Package
        run: |
          pkg_dir=$(echo ${{ matrix.package }} | sed 's/@.*\///')
          if [[ -f "packages/$pkg_dir/package.json" ]]; then
            cd packages/$pkg_dir
            if grep -q '"test"' package.json; then
              bun test || echo "⚠️ Tests failed for ${{ matrix.package }}"
            fi
          fi

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.package }}
          path: packages/$(echo ${{ matrix.package }} | sed 's/@.*\///')/dist/
          retention-days: 7

  # Publish to NPM
  publish:
    name: 📦 Publish ${{ matrix.package }}
    runs-on: ubuntu-latest
    needs: [prepare, build]
    strategy:
      matrix:
        package: ${{ fromJson(needs.prepare.outputs.packages) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Download Build
        uses: actions/download-artifact@v4
        with:
          name: build-${{ matrix.package }}
          path: packages/$(echo ${{ matrix.package }} | sed 's/@.*\///')/dist/

      - name: Publish to NPM
        if: github.event.inputs.dry_run != 'true'
        run: |
          pkg_dir=$(echo ${{ matrix.package }} | sed 's/@.*\///')
          cd packages/$pkg_dir
          bun publish --tag ${{ needs.prepare.outputs.tag }} --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Dry Run
        if: github.event.inputs.dry_run == 'true'
        run: |
          pkg_dir=$(echo ${{ matrix.package }} | sed 's/@.*\///')
          cd packages/$pkg_dir
          bun publish --dry-run --tag ${{ needs.prepare.outputs.tag }}

  # VS Code Extension Publishing
  publish-vscode:
    name: 📦 Publish VS Code Extension
    runs-on: ubuntu-latest
    needs: prepare
    if: contains(needs.prepare.outputs.packages, 'kilo-vscode') || github.event.inputs.package == 'all'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build Extension
        run: |
          bun run extension

      - name: Package Extension
        run: |
          cd packages/kilo-vscode
          npx vsce package --out ${{ github.workspace }}/kilo-code.vsix

      - name: Publish to VS Code Marketplace
        if: github.event.inputs.dry_run != 'true'
        run: |
          npx vsce publish --packagePath kilo-code.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Dry Run
        if: github.event.inputs.dry_run == 'true'
        run: |
          echo "🔍 VS Code Extension dry run"
          echo "Extension package: kilo-code.vsix"
          ls -la kilo-code.vsix

  # Docker Image Publishing
  publish-docker:
    name: 🐳 Publish Docker Images
    runs-on: ubuntu-latest
    needs: prepare
    if: github.event.inputs.package == 'all'
    strategy:
      matrix:
        image:
          - kilo-cli
          - kilo-web
          - kilo-desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event.inputs.dry_run != 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        if: github.event.inputs.dry_run != 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/${{ matrix.image }}.Dockerfile
          push: true
          tags: |
            kilocode/${{ matrix.image }}:latest
            kilocode/${{ matrix.image }}:${{ needs.prepare.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Only (Dry Run)
        if: github.event.inputs.dry_run == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/${{ matrix.image }}.Dockerfile
          push: false
          tags: kilocode/${{ matrix.image }}:dry-run
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Update Package Registry
  update-registry:
    name: 📋 Update Package Registry
    runs-on: ubuntu-latest
    needs: [prepare, publish]
    if: github.event.inputs.dry_run != 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update Registry
        run: |
          echo "📋 Updating package registry..."
          # Create registry update script
          cat > update-registry.js << 'EOF'
          const fs = require('fs');
          const path = require('path');
          
          // Read current package versions
          const packagesDir = path.join(__dirname, 'packages');
          const registry = {};
          
          fs.readdirSync(packagesDir).forEach(pkg => {
            const pkgJson = path.join(packagesDir, pkg, 'package.json');
            if (fs.existsSync(pkgJson)) {
              const packageInfo = JSON.parse(fs.readFileSync(pkgJson, 'utf8'));
              if (packageInfo.name && packageInfo.version) {
                registry[packageInfo.name] = {
                  version: packageInfo.version,
                  description: packageInfo.description,
                  lastUpdated: new Date().toISOString()
                };
              }
            }
          });
          
          // Save registry
          fs.writeFileSync('package-registry.json', JSON.stringify(registry, null, 2));
          console.log('✅ Package registry updated');
          EOF
          
          node update-registry.js

      - name: Commit Registry Update
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add package-registry.json
          git commit -m "📋 Update package registry" || exit 0
          git push || exit 0

  # Summary
  summary:
    name: 📊 Publishing Summary
    runs-on: ubuntu-latest
    needs: [prepare, publish, publish-vscode, publish-docker]
    if: always()
    steps:
      - name: Publishing Summary
        run: |
          echo "📊 Package Publishing Summary"
          echo "============================"
          echo "Packages: ${{ needs.prepare.outputs.packages }}"
          echo "Tag: ${{ needs.prepare.outputs.tag }}"
          echo "Dry Run: ${{ github.event.inputs.dry_run }}"
          echo ""
          echo "Results:"
          echo "- NPM Publishing: ${{ needs.publish.result }}"
          echo "- VS Code Extension: ${{ needs.publish-vscode.result }}"
          echo "- Docker Images: ${{ needs.publish-docker.result }}"
          echo ""
          if [[ "${{ needs.publish.result }}" == "success" ]]; then
            echo "✅ Package publishing completed successfully!"
          else
            echo "❌ Some packages failed to publish"
          fi
