name: Quality Gates

on:
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  BUN_VERSION: '1.3.10'

jobs:
  # Code quality checks
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'bun'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run linting
        run: bun run lint
        continue-on-error: false

      - name: Run type checking
        run: bun run typecheck
        continue-on-error: false

      - name: Check code formatting
        run: bun run format
        continue-on-error: false

      - name: Validate test structure
        run: node scripts/validate-tests-simple.js
        continue-on-error: false

  # Security checks
  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'bun'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run security audit
        run: bun audit
        continue-on-error: false

      - name: Run security tests
        run: bun run test:security
        continue-on-error: false

  # Test coverage
  test-coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'bun'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests with coverage
        run: bun run test:unit --coverage
        continue-on-error: false

      - name: Check coverage thresholds
        run: |
          # Check if coverage meets minimum thresholds
          COVERAGE_FILE="coverage/coverage-summary.json"
          if [ -f "$COVERAGE_FILE" ]; then
            STATEMENTS=$(jq '.total.statements.pct' "$COVERAGE_FILE")
            BRANCHES=$(jq '.total.branches.pct' "$COVERAGE_FILE")
            FUNCTIONS=$(jq '.total.functions.pct' "$COVERAGE_FILE")
            LINES=$(jq '.total.lines.pct' "$COVERAGE_FILE")
            
            echo "Coverage Summary:"
            echo "Statements: $STATEMENTS%"
            echo "Branches: $BRANCHES%"
            echo "Functions: $FUNCTIONS%"
            echo "Lines: $LINES%"
            
            # Check minimum coverage thresholds
            MIN_STATEMENTS=80
            MIN_BRANCHES=75
            MIN_FUNCTIONS=80
            MIN_LINES=80
            
            if (( $(echo "$STATEMENTS < $MIN_STATEMENTS" | bc -l) )); then
              echo "❌ Statement coverage ($STATEMENTS%) below threshold ($MIN_STATEMENTS%)"
              exit 1
            fi
            
            if (( $(echo "$BRANCHES < $MIN_BRANCHES" | bc -l) )); then
              echo "❌ Branch coverage ($BRANCHES%) below threshold ($MIN_BRANCHES%)"
              exit 1
            fi
            
            if (( $(echo "$FUNCTIONS < $MIN_FUNCTIONS" | bc -l) )); then
              echo "❌ Function coverage ($FUNCTIONS%) below threshold ($MIN_FUNCTIONS%)"
              exit 1
            fi
            
            if (( $(echo "$LINES < $MIN_LINES" | bc -l) )); then
              echo "❌ Line coverage ($LINES%) below threshold ($MIN_LINES%)"
              exit 1
            fi
            
            echo "✅ All coverage thresholds met"
          else
            echo "❌ Coverage file not found"
            exit 1
          fi
        continue-on-error: false

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage/lcov.info
          flags: unittests
          fail_ci_if_error: true

  # Performance checks
  performance:
    name: Performance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'bun'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run performance tests
        run: bun run test:performance
        continue-on-error: false

      - name: Check bundle size
        run: |
          # Check if bundle sizes are within limits
          MAX_BUNDLE_SIZE=1000000  # 1MB
          
          for package in packages/*/dist; do
            if [ -d "$package" ]; then
              SIZE=$(du -sb "$package" | cut -f1)
              SIZE_MB=$((SIZE / 1048576))
              
              echo "Bundle size for $package: ${SIZE_MB}MB"
              
              if [ $SIZE -gt $MAX_BUNDLE_SIZE ]; then
                echo "❌ Bundle size ($SIZE bytes) exceeds limit ($MAX_BUNDLE_SIZE bytes)"
                exit 1
              fi
            fi
          done
          
          echo "✅ All bundle sizes within limits"
        continue-on-error: false

  # Documentation checks
  documentation:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'bun'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check README exists
        run: |
          if [ ! -f "README.md" ]; then
            echo "❌ README.md not found"
            exit 1
          fi
          
          # Check README has minimum content
          README_SIZE=$(stat -f%z "README.md" 2>/dev/null || stat -c%s "README.md")
          if [ $README_SIZE -lt 1000 ]; then
            echo "❌ README.md too small ($README_SIZE bytes)"
            exit 1
          fi
          
          echo "✅ README.md exists and has sufficient content"
        continue-on-error: false

      - name: Check API documentation
        run: |
          # Check for API documentation in TypeScript files
          API_DOCS=$(find packages/*/src -name "*.ts" -exec grep -l "@param\|@returns\|@example" {} \; | wc -l)
          
          if [ $API_DOCS -lt 10 ]; then
            echo "❌ Insufficient API documentation ($API_DOCS files with JSDoc)"
            exit 1
          fi
          
          echo "✅ API documentation found in $API_DOCS files"
        continue-on-error: false

      - name: Check changelog exists
        run: |
          if [ ! -f "CHANGELOG.md" ]; then
            echo "❌ CHANGELOG.md not found"
            exit 1
          fi
          
          echo "✅ CHANGELOG.md exists"
        continue-on-error: false

  # Build verification
  build-verification:
    name: Build Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'bun'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all packages
        run: bun run build:repo
        continue-on-error: false

      - name: Verify build artifacts
        run: |
          # Check if build artifacts exist
          BUILD_DIRS=("packages/opencode/dist" "packages/kilo-vscode/dist" "packages/kilo-ui/dist")
          
          for dir in "${BUILD_DIRS[@]}"; do
            if [ ! -d "$dir" ]; then
              echo "❌ Build directory $dir not found"
              exit 1
            fi
            
            # Check if directory has content
            if [ -z "$(ls -A $dir)" ]; then
              echo "❌ Build directory $dir is empty"
              exit 1
            fi
          done
          
          echo "✅ All build artifacts created successfully"
        continue-on-error: false

  # Quality gate summary
  quality-gate-summary:
    name: Quality Gate Summary
    runs-on: ubuntu-latest
    needs: [code-quality, security, test-coverage, performance, documentation, build-verification]
    if: always()
    steps:
      - name: Quality Gate Summary
        run: |
          echo "# Quality Gate Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          
          # Add results for each quality gate
          if [ "${{ needs.code-quality.result }}" = "success" ]; then
            echo "| Code Quality | ✅ |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Code Quality | ❌ |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.security.result }}" = "success" ]; then
            echo "| Security | ✅ |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Security | ❌ |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.test-coverage.result }}" = "success" ]; then
            echo "| Test Coverage | ✅ |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Test Coverage | ❌ |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.performance.result }}" = "success" ]; then
            echo "| Performance | ✅ |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Performance | ❌ |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.documentation.result }}" = "success" ]; then
            echo "| Documentation | ✅ |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Documentation | ❌ |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.build-verification.result }}" = "success" ]; then
            echo "| Build Verification | ✅ |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Build Verification | ❌ |" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Overall status
          if [ "${{ needs.code-quality.result }}" = "success" ] && \
             [ "${{ needs.security.result }}" = "success" ] && \
             [ "${{ needs.test-coverage.result }}" = "success" ] && \
             [ "${{ needs.performance.result }}" = "success" ] && \
             [ "${{ needs.documentation.result }}" = "success" ] && \
             [ "${{ needs.build-verification.result }}" = "success" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "🎉 **All quality gates passed!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ **Some quality gates failed. Please address the issues above.**" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
