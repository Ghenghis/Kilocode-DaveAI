name: ci-core

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Lint
        run: bun run lint
      - name: Typecheck
        run: bun run typecheck
      - name: Format Check
        run: bun run format
      - name: Unit tests
        run: bun run test:unit
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-core-logs
          path: |
            **/test-results/**
            **/coverage/**
            bun.lock
