name: install-integrity

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Clean install
        run: |
          rm -rf node_modules
          rm -rf packages/*/node_modules
          bun install --frozen-lockfile

      - name: Verify workspace resolution
        run: bun pm ls

      - name: Verify dependency scripts
        run: bun run --help | grep -E "(lint|typecheck|test)"

      - name: Check lockfile consistency
        run: bun pm hash

  install-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Clean install (Windows)
        run: |
          Remove-Item -Recurse -Force node_modules -ErrorAction SilentlyContinue
          Get-ChildItem -Path packages -Recurse -Name node_modules | ForEach-Object { Remove-Item -Recurse -Force "packages/$_/node_modules" -ErrorAction SilentlyContinue }
          bun install --frozen-lockfile

      - name: Verify workspace resolution (Windows)
        run: bun pm ls

      - name: Verify dependency scripts (Windows)
        run: bun run --help | Select-String -Pattern "(lint|typecheck|test)"
