name: 📦 Package Publishing

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish (or "all")'
        required: true
        type: string
        default: 'all'
      tag:
        description: 'Publish tag'
        required: false
        type: choice
        options:
          - latest
          - next
          - beta
          - alpha
        default: 'latest'
      dry_run:
        description: 'Dry run (no actual publishing)'
        required: false
        type: boolean
        default: false
      force:
        description: 'Force publish (skip version checks)'
        required: false
        type: boolean
        default: false

env:
  NODE_VERSION: '20'
  BUN_VERSION: '1.3.10'

jobs:
  # Validate and prepare
  prepare:
    name: 🔍 Prepare Publishing
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.matrix.outputs.packages }}
      tag: ${{ steps.tag.outputs.tag }}
      dry_run: ${{ github.event.inputs.dry_run }}
      force: ${{ github.event.inputs.force }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Determine Packages
        id: matrix
        run: |
          if [[ "${{ github.event.inputs.package }}" == "all" ]]; then
            PACKAGES='["@kilocode/cli","@kilocode/kilo-gateway","@kilocode/kilo-telemetry","@kilocode/kilo-i18n","@kilocode/plugin","@kilocode/util","@kilocode/kilo-ui","@opencode-ai/app","@opencode-ai/desktop","@opencode-ai/desktop-electron","@opencode-ai/storybook","@kilocode/kilo-docs","@kilocode/sdk"]'
          else
            PACKAGES='${{ github.event.inputs.package }}'
          fi
          echo "packages=$PACKAGES" >> $GITHUB_OUTPUT
          echo "📦 Publishing packages: $PACKAGES"

      - name: Set Tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "🏷️ Publishing tag: $TAG"

      - name: Validate Packages
        run: |
          for pkg in $(echo '${{ steps.matrix.outputs.packages }}' | tr ',' '\n'); do
            pkg_dir=$(echo $pkg | sed 's/@.*\///')
            if [[ "$pkg_dir" == "sdk" ]]; then
              pkg_dir="sdk/js"
            fi
            
            if [[ ! -d "packages/$pkg_dir" ]]; then
              echo "❌ Package directory not found: packages/$pkg_dir"
              exit 1
            fi
            
            if [[ ! -f "packages/$pkg_dir/package.json" ]]; then
              echo "❌ package.json not found: packages/$pkg_dir/package.json"
              exit 1
            fi
          done
          echo "✅ All packages validated"

  # Build and test packages
  build:
    name: 🔨 Build ${{ matrix.package }}
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix:
        package: ${{ fromJson(needs.prepare.outputs.packages) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build Package
        run: |
          pkg_dir=$(echo ${{ matrix.package }} | sed 's/@.*\///')
          if [[ "$pkg_dir" == "sdk" ]]; then
            pkg_dir="sdk/js"
          fi
          bun run --cwd packages/$pkg_dir build

      - name: Run Tests
        run: |
          pkg_dir=$(echo ${{ matrix.package }} | sed 's/@.*\///')
          if [[ "$pkg_dir" == "sdk" ]]; then
            pkg_dir="sdk/js"
          fi
          cd packages/$pkg_dir
          
          if [[ -f "package.json" ]] && grep -q '"test"' package.json; then
            echo "🧪 Running tests for ${{ matrix.package }}..."
            bun test || echo "⚠️ Tests failed for ${{ matrix.package }}"
          else
            echo "⏭️ No tests found for ${{ matrix.package }}"
          fi

      - name: Validate Build
        run: |
          pkg_dir=$(echo ${{ matrix.package }} | sed 's/@.*\///')
          if [[ "$pkg_dir" == "sdk" ]]; then
            pkg_dir="sdk/js"
          fi
          
          if [[ ! -d "packages/$pkg_dir/dist" ]]; then
            echo "❌ Build failed - no dist directory found"
            exit 1
          fi
          
          echo "✅ Build validated for ${{ matrix.package }}"

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.package }}
          path: packages/$(echo ${{ matrix.package }} | sed 's/@.*\///')/dist/
          retention-days: 7

  # Publish to NPM
  publish:
    name: 📦 Publish ${{ matrix.package }}
    runs-on: ubuntu-latest
    needs: [prepare, build]
    strategy:
      matrix:
        package: ${{ fromJson(needs.prepare.outputs.packages) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Download Build
        uses: actions/download-artifact@v4
        with:
          name: build-${{ matrix.package }}
          path: packages/$(echo ${{ matrix.package }} | sed 's/@.*\///')/dist/

      - name: Check Package Version
        run: |
          pkg_dir=$(echo ${{ matrix.package }} | sed 's/@.*\///')
          if [[ "$pkg_dir" == "sdk" ]]; then
            pkg_dir="sdk/js"
          fi
          cd packages/$pkg_dir
          
          VERSION=$(node -p "require('./package.json').version")
          echo "📦 Package: ${{ matrix.package }}"
          echo "🏷️ Version: $VERSION"
          echo "🏷️ Tag: ${{ needs.prepare.outputs.tag }}"
          
          if [[ "${{ needs.prepare.outputs.force }}" != "true" ]]; then
            # Check if version exists on NPM
            if npm view ${{ matrix.package }}@$VERSION version &>/dev/null; then
              echo "⚠️ Version $VERSION already exists on NPM"
              if [[ "${{ needs.prepare.outputs.dry_run }}" != "true" ]]; then
                echo "Use force: true to override"
                exit 1
              fi
            fi
          fi

      - name: Publish to NPM
        if: github.event.inputs.dry_run != 'true'
        run: |
          pkg_dir=$(echo ${{ matrix.package }} | sed 's/@.*\///')
          if [[ "$pkg_dir" == "sdk" ]]; then
            pkg_dir="sdk/js"
          fi
          cd packages/$pkg_dir
          
          echo "🚀 Publishing ${{ matrix.package }} with tag ${{ needs.prepare.outputs.tag }}..."
          bun publish --access public --tag ${{ needs.prepare.outputs.tag }}
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Dry Run
        if: github.event.inputs.dry_run == 'true'
        run: |
          pkg_dir=$(echo ${{ matrix.package }} | sed 's/@.*\///')
          if [[ "$pkg_dir" == "sdk" ]]; then
            pkg_dir="sdk/js"
          fi
          cd packages/$pkg_dir
          
          echo "🔍 Dry run for ${{ matrix.package }}"
          bun publish --dry-run --access public --tag ${{ needs.prepare.outputs.tag }}

      - name: Verify Publishing
        if: github.event.inputs.dry_run != 'true'
        run: |
          sleep 5  # Wait for NPM to update
          pkg_dir=$(echo ${{ matrix.package }} | sed 's/@.*\///')
          if [[ "$pkg_dir" == "sdk" ]]; then
            pkg_dir="sdk/js"
          fi
          cd packages/$pkg_dir
          
          VERSION=$(node -p "require('./package.json').version")
          if npm view ${{ matrix.package }}@$VERSION version &>/dev/null; then
            echo "✅ Successfully published ${{ matrix.package }}@$VERSION"
          else
            echo "❌ Publishing verification failed"
            exit 1
          fi

  # Publish VS Code Extension
  publish-vscode:
    name: 📦 Publish VS Code Extension
    runs-on: ubuntu-latest
    needs: prepare
    if: github.event.inputs.package == 'all' || github.event.inputs.package == 'kilo-code'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build Extension
        run: |
          bun run extension

      - name: Package Extension
        run: |
          cd packages/kilo-vscode
          npx vsce package --out ${{ github.workspace }}/kilo-code.vsix

      - name: Check Extension Version
        run: |
          cd packages/kilo-vscode
          VERSION=$(node -p "require('./package.json').version")
          echo "📦 VS Code Extension"
          echo "🏷️ Version: $VERSION"
          echo "🏷️ Tag: ${{ needs.prepare.outputs.tag }}"

      - name: Publish to VS Code Marketplace
        if: github.event.inputs.dry_run != 'true'
        run: |
          cd packages/kilo-vscode
          echo "🚀 Publishing VS Code extension..."
          npx vsce publish --packagePath kilo-code.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Dry Run
        if: github.event.inputs.dry_run == 'true'
        run: |
          echo "🔍 VS Code Extension dry run"
          echo "Extension package: kilo-code.vsix"
          ls -la kilo-code.vsix

      - name: Verify Publishing
        if: github.event.inputs.dry_run != 'true'
        run: |
          echo "✅ VS Code extension published successfully!"
          echo "🔗 Check: https://marketplace.visualstudio.com/items?itemName=kilocode.Kilo-Code"

  # Update Package Registry
  update-registry:
    name: 📋 Update Package Registry
    runs-on: ubuntu-latest
    needs: [prepare, publish]
    if: github.event.inputs.dry_run != 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Registry
        run: |
          echo "📋 Updating package registry..."
          
          # Create updated registry
          node -e "
          const fs = require('fs');
          const path = require('path');
          
          const packages = ${{ needs.prepare.outputs.packages }};
          const registry = {};
          
          packages.forEach(pkg => {
            const pkgDir = pkg.replace('@', '').replace('/', '');
            if (pkgDir === 'kilocodesdk') pkgDir = 'sdk/js';
            
            const pkgJsonPath = path.join('packages', pkgDir, 'package.json');
            if (fs.existsSync(pkgJsonPath)) {
              const packageInfo = JSON.parse(fs.readFileSync(pkgJsonPath, 'utf8'));
              registry[pkg] = {
                version: packageInfo.version,
                description: packageInfo.description,
                published: new Date().toISOString(),
                tag: '${{ needs.prepare.outputs.tag }}'
              };
            }
          });
          
          // Add VS Code extension
          const vscodePackageJson = path.join('packages', 'kilo-vscode', 'package.json');
          if (fs.existsSync(vscodePackageJson)) {
            const vscodeInfo = JSON.parse(fs.readFileSync(vscodePackageJson, 'utf8'));
            registry['kilo-code'] = {
              version: vscodeInfo.version,
              description: vscodeInfo.description,
              published: new Date().toISOString(),
              tag: '${{ needs.prepare.outputs.tag }}',
              type: 'vscode-extension'
            };
          }
          
          fs.writeFileSync('package-registry.json', JSON.stringify(registry, null, 2));
          console.log('✅ Package registry updated');
          "

      - name: Commit Registry Update
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add package-registry.json
          git commit -m "📋 Update package registry - ${{ needs.prepare.outputs.tag }}" || exit 0
          git push || exit 0

  # Publishing Summary
  summary:
    name: 📊 Publishing Summary
    runs-on: ubuntu-latest
    needs: [prepare, publish, publish-vscode, update-registry]
    if: always()
    steps:
      - name: Publishing Summary
        run: |
          echo "📊 Package Publishing Summary"
          echo "============================"
          echo "Packages: ${{ needs.prepare.outputs.packages }}"
          echo "Tag: ${{ needs.prepare.outputs.tag }}"
          echo "Dry Run: ${{ needs.prepare.outputs.dry_run }}"
          echo "Force: ${{ needs.prepare.outputs.force }}"
          echo ""
          echo "Results:"
          echo "- Package Building: ${{ needs.build.result }}"
          echo "- NPM Publishing: ${{ needs.publish.result }}"
          echo "- VS Code Extension: ${{ needs.publish-vscode.result }}"
          echo "- Registry Update: ${{ needs.update-registry.result }}"
          echo ""
          
          if [[ "${{ needs.publish.result }}" == "success" ]]; then
            echo "✅ Package publishing completed successfully!"
            if [[ "${{ needs.prepare.outputs.dry_run }}" != "true" ]]; then
              echo "📦 Packages are now available on NPM"
              echo "🔗 Search: https://www.npmjs.com/search?q=%40kilocode"
            else
              echo "🔍 Dry run completed - no actual publishing"
            fi
          else
            echo "❌ Some packages failed to publish"
            echo "Check the job logs for details"
          fi
          
          if [[ "${{ needs.publish-vscode.result }}" == "success" ]]; then
            echo "✅ VS Code extension published successfully!"
          elif [[ "${{ needs.publish-vscode.result }}" == "skipped" ]]; then
            echo "⏭️ VS Code extension publishing skipped"
          else
            echo "❌ VS Code extension publishing failed"
          fi

      - name: Create Summary Badge
        if: needs.publish.result == 'success'
        run: |
          echo "🏆 Publishing completed successfully!"
          echo "![NPM Version](https://img.shields.io/npm/v/@kilocode/cli?style=flat-square)"
          echo "![VS Code Version](https://img.shields.io/visual-studio-marketplace/v/kilocode.kilo-code?style=flat-square)"
