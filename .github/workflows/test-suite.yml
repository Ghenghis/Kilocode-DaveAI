name: Test Suite CI/CD

on:
  push:
    branches: [ main, develop, 'release/*', 'feature/*', 'hotfix/*' ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      test_category:
        description: 'Test category to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - governance
          - migration
          - performance
          - resilience
          - scalability
          - disaster-recovery
          - security
          - cicd
          - deployment
          - release

env:
  NODE_VERSION: '20'
  BUN_VERSION: '1.3.10'

jobs:
  # Pre-flight checks
  pre-flight:
    name: Pre-flight Checks
    runs-on: ubuntu-latest
    outputs:
      should_run_tests: ${{ steps.changes.outputs.should_run_tests }}
      test_category: ${{ steps.changes.outputs.test_category }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run_tests=true" >> $GITHUB_OUTPUT
            echo "test_category=${{ github.event.inputs.test_category || 'all' }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "push" ]; then
            echo "should_run_tests=true" >> $GITHUB_OUTPUT
            echo "test_category=all" >> $GITHUB_OUTPUT
          else
            # For PRs, check if test files changed
            if git diff --name-only origin/${{ github.base_ref }}..HEAD | grep -E "tests/.*\.spec\.ts$"; then
              echo "should_run_tests=true" >> $GITHUB_OUTPUT
              echo "test_category=all" >> $GITHUB_OUTPUT
            else
              echo "should_run_tests=false" >> $GITHUB_OUTPUT
              echo "test_category=none" >> $GITHUB_OUTPUT
            fi
          fi

  # Setup and validation
  setup:
    name: Setup Environment
    runs-on: ubuntu-latest
    needs: pre-flight
    if: needs.pre-flight.outputs.should_run_tests == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'bun'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps

      - name: Validate test structure
        run: node scripts/validate-tests-simple.js

  # Lint and type checking
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'bun'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run linting
        run: bun run lint

      - name: Run type checking
        run: bun run typecheck

  # Unit tests
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'bun'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        run: bun run test:unit

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage/lcov.info
          flags: unittests

  # Governance tests
  governance-tests:
    name: Governance Tests
    runs-on: ubuntu-latest
    needs: setup
    if: needs.pre-flight.outputs.test_category == 'all' || needs.pre-flight.outputs.test_category == 'governance'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'bun'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run governance tests
        run: bun run test:governance

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: governance-test-results
          path: test-results/

  # Performance tests
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: setup
    if: needs.pre-flight.outputs.test_category == 'all' || needs.pre-flight.outputs.test_category == 'performance'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'bun'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run performance tests
        run: bun run test:performance

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: performance-test-results
          path: test-results/

  # Security tests
  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    needs: setup
    if: needs.pre-flight.outputs.test_category == 'all' || needs.pre-flight.outputs.test_category == 'security'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'bun'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run security tests
        run: bun run test:security

      - name: Run security audit
        run: bun audit

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: security-test-results
          path: test-results/

  # Migration tests
  migration-tests:
    name: Migration Tests
    runs-on: ubuntu-latest
    needs: setup
    if: needs.pre-flight.outputs.test_category == 'all' || needs.pre-flight.outputs.test_category == 'migration'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'bun'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run migration tests
        run: bun run test:migration

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: migration-test-results
          path: test-results/

  # Resilience tests
  resilience-tests:
    name: Resilience Tests
    runs-on: ubuntu-latest
    needs: setup
    if: needs.pre-flight.outputs.test_category == 'all' || needs.pre-flight.outputs.test_category == 'resilience'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'bun'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run resilience tests
        run: bun run test:resilience

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: resilience-test-results
          path: test-results/

  # Scalability tests
  scalability-tests:
    name: Scalability Tests
    runs-on: ubuntu-latest
    needs: setup
    if: needs.pre-flight.outputs.test_category == 'all' || needs.pre-flight.outputs.test_category == 'scalability'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'bun'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run scalability tests
        run: bun run test:scalability

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: scalability-test-results
          path: test-results/

  # Disaster recovery tests
  disaster-recovery-tests:
    name: Disaster Recovery Tests
    runs-on: ubuntu-latest
    needs: setup
    if: needs.pre-flight.outputs.test_category == 'all' || needs.pre-flight.outputs.test_category == 'disaster-recovery'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'bun'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run disaster recovery tests
        run: bun run test:disaster-recovery

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: disaster-recovery-test-results
          path: test-results/

  # CI/CD tests
  cicd-tests:
    name: CI/CD Tests
    runs-on: ubuntu-latest
    needs: setup
    if: needs.pre-flight.outputs.test_category == 'all' || needs.pre-flight.outputs.test_category == 'cicd'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'bun'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run CI/CD tests
        run: bun run test:cicd

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: cicd-test-results
          path: test-results/

  # Deployment tests
  deployment-tests:
    name: Deployment Tests
    runs-on: ubuntu-latest
    needs: setup
    if: needs.pre-flight.outputs.test_category == 'all' || needs.pre-flight.outputs.test_category == 'deployment'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'bun'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run deployment tests
        run: bun run test:deployment

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: deployment-test-results
          path: test-results/

  # Release tests
  release-tests:
    name: Release Tests
    runs-on: ubuntu-latest
    needs: setup
    if: needs.pre-flight.outputs.test_category == 'all' || needs.pre-flight.outputs.test_category == 'release'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'bun'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run release tests
        run: bun run test:release

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: release-test-results
          path: test-results/

  # Build and package
  build:
    name: Build & Package
    runs-on: ubuntu-latest
    needs: [lint-typecheck, unit-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'bun'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build:repo

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-artifacts
          path: |
            packages/*/dist/
            packages/*/build/
            packages/*/out/

  # Test results summary
  test-summary:
    name: Test Results Summary
    runs-on: ubuntu-latest
    needs: [governance-tests, performance-tests, security-tests, migration-tests, resilience-tests, scalability-tests, disaster-recovery-tests, cicd-tests, deployment-tests, release-tests]
    if: always()
    steps:
      - name: Download all test results
        uses: actions/download-artifact@v3
        with:
          path: test-results/

      - name: Generate test summary
        run: |
          echo "# Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Category | Status | Tests |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|-------|" >> $GITHUB_STEP_SUMMARY
          
          # Add results for each test category
          for category in governance performance security migration resilience scalability disaster-recovery cicd deployment release; do
            if [ -d "test-results/${category}-test-results" ]; then
              echo "| $category | ✅ | Completed |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $category | ❌ | Skipped |" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Upload combined test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: all-test-results
          path: test-results/
