name: Setup Windows Shell

description: Configures Windows runner with Unix-like shell environment for cross-platform compatibility

inputs:
  shell:
    description: 'Shell to setup (bash, powershell)'
    required: false
    default: bash

runs:
  using: composite
  steps:
    - name: Configure Git autocrlf
      shell: bash
      run: |
        git config --global core.autocrlf input

    - name: Setup MSYS2 environment
      if: false  # Disabled for now, Git Bash is sufficient
      shell: bash
      run: |
        # MSYS2 configuration for Unix-like environment
        echo "C:\msys64\usr\bin" >> $GITHUB_PATH
        echo "C:\msys64\mingw64\bin" >> $GITHUB_PATH

    - name: Verify Unix commands available
      shell: bash
      run: |
        # Verify bash is available
        which bash || echo "bash not found in PATH"
        bash --version || echo "bash version check failed"
        
        # Verify common Unix commands
        which sed || echo "sed not found"
        which grep || echo "grep not found"
        which awk || echo "awk not found"

    - name: Configure git for cross-platform tests
      shell: bash
      run: |
        # Disable git hooks that may cause issues on Windows
        git config --global core.hooksPath ""
        
        # Set safe directory for tests
        git config --global safe.directory '*'

    - name: Set PATH for Unix tools
      shell: bash
      run: |
        # Add Git Bash to PATH
        echo "C:/Program Files/Git/bin" >> $GITHUB_PATH
        echo "C:/Program Files/Git/usr/bin" >> $GITHUB_PATH

    - name: Configure test environment
      shell: bash
      run: |
        # Environment variables for cross-platform compatibility
        echo "MSYS2_PATH_TYPE=minimal" >> $GITHUB_ENV
        echo "GIT_AUTOCRLF=input" >> $GITHUB_ENV
        
        # Force Windows to use Unix-style paths in Git Bash
        echo "CYGWIN=nodosfilewarning" >> $GITHUB_ENV
